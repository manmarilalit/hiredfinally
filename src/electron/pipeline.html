<!doctype html>
<html lang="en">

<head>
    <script>
        window.lucide = require(
            require("path").join(__dirname, "..", "..", "node_modules", "lucide", "dist", "umd", "lucide.min.js"),
        );
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pipeline — HiredFinally</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        input,
        textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e2e2;
            border-radius: 4px;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        :root {
            --black: #111111;
            --white: #ffffff;
            --bg: #ffffff;
            --card: #f0f0f0;
            --border: #e2e2e2;
            --gray-400: #aaaaaa;
            --gray-600: #666666;
            --radius: 14px;
            --radius-sm: 9px;
            --sidebar-w: 110px;
            --gap: 22px;
            --amber: #f0a05a;
            --green: #3ecf8e;
            --blue: #5ab0f0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            font-family: "Space Grotesk", sans-serif;
            background: var(--bg);
            overflow: hidden;
            color: var(--black);
            -webkit-user-select: none;
            user-select: none;
        }

        .app {
            display: flex;
            width: 100vw;
            height: 100vh;
            padding: 38px var(--gap);
            gap: var(--gap);
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            background: var(--black);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 0;
            position: relative;
            z-index: 50;
        }

        .sidebar-logo {
            font-size: 19px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -0.5px;
            margin-bottom: 28px;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex: 1;
        }

        .sidebar-bottom {
            margin-top: auto;
        }

        .nav-item {
            width: 44px;
            height: 44px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.16);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            stroke: rgba(255, 255, 255, 0.6);
            stroke-width: 2;
            transition: stroke 0.15s;
        }

        .nav-item.active svg {
            stroke: #ffffff;
        }

        .nav-item:hover svg {
            stroke: #ffffff;
        }

        /* ── Main ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            padding-top: 22px;
            padding-left: 32px;
            padding-right: 32px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 14px;
            flex-shrink: 0;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--black);
            letter-spacing: -0.3px;
            flex: 1;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tb-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--white);
            font-family: "Space Grotesk", sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: var(--gray-600);
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .tb-btn:hover {
            border-color: var(--black);
            color: var(--black);
        }

        .tb-btn svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* ── Stats ── */
        .stats-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 14px;
            flex-shrink: 0;
        }

        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: var(--black);
            line-height: 1;
            letter-spacing: -1px;
        }

        .stat-number.amber {
            color: var(--amber);
        }

        .stat-number.green {
            color: var(--green);
        }

        .stat-number.blue {
            color: var(--blue);
        }

        .stat-label {
            font-size: 11px;
            color: var(--gray-600);
            margin-top: 4px;
            font-weight: 500;
        }

        /* ── Controls ── */
        .table-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--card);
            border-radius: var(--radius-sm);
            padding: 3px;
        }

        .tab-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 13px;
            border-radius: 7px;
            font-family: "Space Grotesk", sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: var(--gray-600);
            border: none;
            background: transparent;
            cursor: pointer;
            transition: color 0.15s, background 0.15s, box-shadow 0.15s;
        }

        .tab-btn:hover {
            color: var(--black);
        }

        .tab-btn.active {
            background: var(--white);
            color: var(--black);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }

        .tab-count {
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 20px;
            background: var(--border);
            color: var(--gray-600);
            min-width: 18px;
            text-align: center;
        }

        .tab-btn.active .tab-count {
            background: var(--card);
        }

        .search-input {
            flex: 1;
            max-width: 280px;
            height: 34px;
            background: var(--card);
            border: none;
            border-radius: var(--radius-sm);
            padding: 0 12px;
            font-family: "Space Grotesk", sans-serif;
            font-size: 12px;
            color: var(--black);
            outline: none;
            -webkit-user-select: text;
            user-select: text;
        }

        .search-input::placeholder {
            color: var(--gray-400);
        }

        .sort-select {
            height: 34px;
            padding: 0 10px;
            background: var(--card);
            border: none;
            border-radius: var(--radius-sm);
            font-family: "Space Grotesk", sans-serif;
            font-size: 12px;
            color: var(--gray-600);
            outline: none;
            cursor: pointer;
        }

        .item-count {
            margin-left: auto;
            font-size: 11px;
            color: var(--gray-400);
            white-space: nowrap;
        }

        /* ── Table ── */
        .table-wrap {
            flex: 1;
            overflow-y: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 2;
        }

        thead tr {
            background: var(--card);
            border-bottom: 1px solid var(--border);
        }

        th {
            padding: 10px 14px;
            text-align: left;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gray-400);
            white-space: nowrap;
            overflow: hidden;
            cursor: pointer;
            transition: color 0.15s;
            -webkit-user-select: none;
            user-select: none;
        }

        th:hover {
            color: var(--black);
        }

        th.sorted {
            color: var(--black);
        }

        th .sort-arr {
            font-size: 8px;
            margin-left: 3px;
            opacity: 0.5;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: var(--card);
        }

        td {
            padding: 11px 14px;
            font-size: 12px;
            color: var(--gray-600);
            vertical-align: middle;
            overflow: hidden;
            max-width: 0;
        }

        .cell-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--black);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cell-title.pending {
            color: var(--gray-400);
        }

        .cell-sub {
            font-size: 11px;
            color: var(--gray-400);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .domain-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 8px;
            border-radius: 5px;
            background: var(--white);
            border: 1px solid var(--border);
            font-size: 10px;
            font-weight: 500;
            color: var(--gray-600);
            white-space: nowrap;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .domain-favicon {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        .link-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            overflow: hidden;
        }

        .link-url {
            font-size: 10px;
            color: var(--gray-400);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }

        .open-btn {
            flex-shrink: 0;
            padding: 3px 8px;
            border-radius: 5px;
            background: var(--card);
            border: 1px solid var(--border);
            font-size: 10px;
            font-weight: 600;
            color: var(--gray-600);
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .open-btn:hover {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
        }

        .status-pill {
            display: inline-block;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            border: 1px solid;
            white-space: nowrap;
            letter-spacing: 0.04em;
        }

        .status-IN_PROGRESS {
            background: rgba(240, 160, 90, 0.12);
            color: #8a5510;
            border-color: rgba(240, 160, 90, 0.35);
        }

        .status-COMPLETED {
            background: rgba(62, 207, 142, 0.12);
            color: #156a42;
            border-color: rgba(62, 207, 142, 0.35);
        }

        .date-rel {
            font-size: 12px;
            color: var(--gray-600);
            white-space: nowrap;
        }

        .date-abs {
            font-size: 10px;
            color: var(--gray-400);
            margin-top: 2px;
            white-space: nowrap;
        }

        .extracting-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--gray-400);
            padding: 2px 7px;
            border-radius: 4px;
            background: var(--card);
            border: 1px solid var(--border);
        }

        .extracting-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--gray-400);
            animation: pulse-dot 1.2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .del-btn {
            display: none;
            margin-top: 5px;
            padding: 2px 8px;
            border-radius: 4px;
            background: #fff0f0;
            color: #c0392b;
            border: 1px solid #f5c0c0;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        tbody tr:hover .del-btn {
            display: inline-block;
        }

        .del-btn:hover {
            background: #fde0e0;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            gap: 10px;
            text-align: center;
        }

        .empty-icon {
            font-size: 40px;
            opacity: 0.12;
            line-height: 1;
        }

        .empty-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--gray-400);
        }

        .empty-desc {
            font-size: 12px;
            color: var(--gray-400);
            max-width: 260px;
            line-height: 1.6;
        }

        .hf-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--black);
            color: var(--white);
            font-size: 12px;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 9999;
        }

        .hf-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Titlebar ── */
        .titlebar {
            position: fixed;
            top: 0;
            right: 0;
            display: flex;
            z-index: 9999;
            -webkit-app-region: drag;
            width: 100%;
            height: 38px;
            justify-content: flex-end;
            align-items: center;
        }

        .titlebar-drag-handle {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 3px;
            background: #d0d0d0;
            border-radius: 99px;
            pointer-events: none;
        }

        .win-btn {
            width: 46px;
            height: 38px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            -webkit-app-region: no-drag;
        }

        .win-btn svg {
            width: 14px;
            height: 14px;
            stroke: #555;
            stroke-width: 2.5;
            pointer-events: none;
        }

        .win-minimize:hover {
            background: #e0e0e0;
        }

        .win-maximize:hover {
            background: #e0e0e0;
        }

        .win-close:hover {
            background: #e81123;
        }

        .win-close:hover svg {
            stroke: #fff;
        }
    </style>
</head>

<body>
    <div class="titlebar">
        <div class="titlebar-drag-handle"></div>
        <button class="win-btn win-minimize" id="btn-minimize"><svg viewBox="0 0 24 24" fill="none">
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg></button>
        <button class="win-btn win-maximize" id="btn-maximize"><svg viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="18" height="18" rx="2" />
            </svg></button>
        <button class="win-btn win-close" id="btn-close"><svg viewBox="0 0 24 24" fill="none">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg></button>
    </div>

    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-logo">HF.</div>
            <nav class="sidebar-nav">
                <div class="nav-item" id="navHome" title="Home"><i data-lucide="house"></i></div>
                <div class="nav-item active" id="navPipeline" title="Applications"><i data-lucide="briefcase"></i></div>
                <div class="nav-item" title="Notifications"><i data-lucide="bell"></i></div>
                <div class="nav-item" title="Analytics"><i data-lucide="bar-chart-2"></i></div>
                <div class="nav-item" id="navSettings" title="Settings"><i data-lucide="settings"></i></div>
            </nav>
            <div class="sidebar-bottom">
                <div class="nav-item" title="Account"><i data-lucide="user"></i></div>
            </div>
        </aside>

        <div class="main">
            <div class="top-bar">
                <div class="page-title">Applications</div>
                <div class="top-bar-right">
                    <button class="tb-btn" id="refreshBtn"><i data-lucide="refresh-cw"></i> Refresh</button>
                </div>
            </div>
            <div class="stats-strip">
                <div class="stat-card">
                    <div class="stat-number" id="statTotal">—</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number amber" id="statInProgress">—</div>
                    <div class="stat-label">In Progress</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number green" id="statCompleted">—</div>
                    <div class="stat-label">Submitted</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number blue" id="statToday">—</div>
                    <div class="stat-label">Today</div>
                </div>
            </div>
            <div class="table-controls">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="all">All <span class="tab-count"
                            id="countAll">0</span></button>
                    <button class="tab-btn" data-tab="IN_PROGRESS">In Progress <span class="tab-count"
                            id="countInProgress">0</span></button>
                    <button class="tab-btn" data-tab="COMPLETED">Submitted <span class="tab-count"
                            id="countCompleted">0</span></button>
                </div>
                <input class="search-input" id="searchInput" type="text" placeholder="Search role, company, URL…" />
                <select class="sort-select" id="sortSelect">
                    <option value="date-desc">Newest first</option>
                    <option value="date-asc">Oldest first</option>
                    <option value="title">By job title</option>
                    <option value="company">By company</option>
                    <option value="domain">By domain</option>
                    <option value="status">By status</option>
                </select>
                <span class="item-count" id="itemCount">— items</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th style="width:22%;" data-sort="title">Role <span class="sort-arr">↕</span></th>
                            <th style="width:16%;" data-sort="company">Company <span class="sort-arr">↕</span></th>
                            <th style="width:14%;" data-sort="domain">Source <span class="sort-arr">↕</span></th>
                            <th style="width:22%;">Link</th>
                            <th style="width:10%;" data-sort="status">Status <span class="sort-arr">↕</span></th>
                            <th style="width:16%;" data-sort="date">Applied <span class="sort-arr">↕</span></th>
                        </tr>
                    </thead>
                    <tbody id="appsBody"></tbody>
                </table>
                <div class="empty-state" id="emptyState" style="display:none;">
                    <div class="empty-icon">📋</div>
                    <div class="empty-title">No applications yet</div>
                    <div class="empty-desc">Applications you start or complete on job boards will appear here
                        automatically.</div>
                </div>
            </div>
        </div>
    </div>

    <div class="hf-toast" id="hfToast"></div>

    <script>
        window.addEventListener("load", () => {
            lucide.createIcons();
            const { ipcRenderer } = require("electron");

            document.getElementById("btn-minimize").addEventListener("click", () => ipcRenderer.send("window-minimize"));
            document.getElementById("btn-maximize").addEventListener("click", () => ipcRenderer.send("window-maximize"));
            document.getElementById("btn-close").addEventListener("click", () => ipcRenderer.send("window-close"));

            document.getElementById("navPipeline").classList.add("active");
            document.getElementById("navHome").addEventListener("click", () => ipcRenderer.send("navigate-home"));
            document.getElementById("navSettings").addEventListener("click", () => ipcRenderer.send("open-settings"));

            function showToast(msg) {
                const t = document.getElementById("hfToast");
                t.textContent = msg; t.classList.add("show");
                setTimeout(() => t.classList.remove("show"), 2400);
            }

            function getDomain(url) {
                try { const h = new URL(url).hostname; const p = h.split('.'); return p.length >= 2 ? p.slice(-2).join('.') : h; }
                catch { return url; }
            }
            function getFavicon(url) { try { return new URL(url).origin + "/favicon.ico"; } catch { return ""; } }
            function relTime(iso) {
                if (!iso) return "—";
                const d = new Date(iso.includes("T") ? iso : iso.replace(" ", "T") + "Z");
                const diff = Date.now() - d.getTime();
                const m = Math.floor(diff / 60000), h = Math.floor(diff / 3600000), day = Math.floor(diff / 86400000);
                if (m < 2) return "just now";
                if (m < 60) return `${m}m ago`;
                if (h < 24) return `${h}h ago`;
                if (day < 7) return `${day}d ago`;
                return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
            }
            function absDate(iso) {
                if (!iso) return "";
                const d = new Date(iso.includes("T") ? iso : iso.replace(" ", "T") + "Z");
                return d.toLocaleString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" });
            }
            function isToday(iso) {
                if (!iso) return false;
                const d = new Date(iso.includes("T") ? iso : iso.replace(" ", "T") + "Z"), n = new Date();
                return d.getDate() === n.getDate() && d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
            }
            function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

            let allApps = [], activeTab = "all", searchQ = "", sortMode = "date-desc";
            let rafPending = false, searchTimer = null;

            function filtered() {
                let arr = [...allApps];
                if (activeTab !== "all") arr = arr.filter(a => a.status === activeTab);
                if (searchQ) {
                    const q = searchQ.toLowerCase();
                    arr = arr.filter(a =>
                        a.url.toLowerCase().includes(q) ||
                        getDomain(a.url).includes(q) ||
                        (a.job_title || "").toLowerCase().includes(q) ||
                        (a.company || "").toLowerCase().includes(q)
                    );
                }
                switch (sortMode) {
                    case "date-desc": arr.sort((a, b) => new Date(b.applied_at) - new Date(a.applied_at)); break;
                    case "date-asc": arr.sort((a, b) => new Date(a.applied_at) - new Date(b.applied_at)); break;
                    case "title": arr.sort((a, b) => (a.job_title || "").localeCompare(b.job_title || "")); break;
                    case "company": arr.sort((a, b) => (a.company || "").localeCompare(b.company || "")); break;
                    case "domain": arr.sort((a, b) => getDomain(a.url).localeCompare(getDomain(b.url))); break;
                    case "status": arr.sort((a, b) => a.status.localeCompare(b.status)); break;
                }
                return arr;
            }

            function scheduleRender() {
                if (rafPending) return;
                rafPending = true;
                requestAnimationFrame(() => { rafPending = false; render(); });
            }

            function render() {
                const apps = filtered();
                const inP = allApps.filter(a => a.status === "IN_PROGRESS").length;
                const comp = allApps.filter(a => a.status === "COMPLETED").length;
                const tod = allApps.filter(a => isToday(a.applied_at)).length;

                document.getElementById("statTotal").textContent = allApps.length;
                document.getElementById("statInProgress").textContent = inP;
                document.getElementById("statCompleted").textContent = comp;
                document.getElementById("statToday").textContent = tod;
                document.getElementById("countAll").textContent = allApps.length;
                document.getElementById("countInProgress").textContent = inP;
                document.getElementById("countCompleted").textContent = comp;
                document.getElementById("itemCount").textContent = `${apps.length} item${apps.length === 1 ? "" : "s"}`;

                const tbody = document.getElementById("appsBody");
                const empty = document.getElementById("emptyState");
                if (apps.length === 0) {
                    tbody.innerHTML = "";
                    empty.style.display = "flex";
                    empty.querySelector(".empty-title").textContent = searchQ ? "No matches" : activeTab !== "all" ? "Nothing here yet" : "No applications yet";
                    empty.querySelector(".empty-desc").textContent = searchQ ? "Try a different search term." : "Applications you start or complete on job boards will appear here automatically.";
                    return;
                }
                empty.style.display = "none";
                tbody.innerHTML = apps.map(app => {
                    const domain = getDomain(app.url);
                    const favicon = getFavicon(app.url);
                    const roleCell = app.job_title
                        ? `<div class="cell-title">${esc(app.job_title)}</div>`
                        : `<div class="cell-title pending"><span class="extracting-badge"><span class="extracting-dot"></span>extracting</span></div>`;
                    const compCell = app.company
                        ? `<span class="cell-sub" style="color:var(--gray-600);font-size:12px;">${esc(app.company)}</span>`
                        : `<span style="color:var(--gray-400);font-size:11px;">—</span>`;
                    const statusLabel = app.status === "IN_PROGRESS" ? "In Progress" : "Submitted";
                    return `<tr data-url="${esc(app.url)}">
                        <td>${roleCell}</td>
                        <td>${compCell}</td>
                        <td><div class="domain-chip"><img class="domain-favicon" src="${esc(favicon)}" onerror="this.style.display='none'" alt="">${esc(domain)}</div></td>
                        <td><div class="link-wrap"><span class="link-url" title="${esc(app.url)}">${esc(app.url)}</span><button class="open-btn" data-url="${esc(app.url)}">↗ Open</button></div></td>
                        <td><span class="status-pill status-${app.status}">${statusLabel}</span></td>
                        <td><div class="date-rel">${relTime(app.applied_at)}</div><div class="date-abs">${absDate(app.applied_at)}</div><button class="del-btn" data-url="${esc(app.url)}">Remove</button></td>
                    </tr>`;
                }).join("");
            }

            function loadData() { ipcRenderer.send("get-all-apps"); }
            ipcRenderer.on("all-apps-data", (_e, data) => { allApps = data || []; scheduleRender(); });
            ipcRenderer.on("app-status-updated", () => loadData());

            document.querySelectorAll(".tab-btn[data-tab]").forEach(btn => {
                btn.addEventListener("click", () => {
                    activeTab = btn.dataset.tab;
                    document.querySelectorAll(".tab-btn[data-tab]").forEach(b => b.classList.toggle("active", b === btn));
                    scheduleRender();
                });
            });

            document.getElementById("searchInput").addEventListener("input", e => {
                clearTimeout(searchTimer);
                const val = e.target.value.trim();
                searchTimer = setTimeout(() => { searchQ = val; scheduleRender(); }, 120);
            });

            document.getElementById("sortSelect").addEventListener("change", e => { sortMode = e.target.value; scheduleRender(); });
            document.querySelectorAll("th[data-sort]").forEach(th => {
                th.addEventListener("click", () => {
                    const s = th.dataset.sort;
                    if (s === "date") sortMode = sortMode === "date-desc" ? "date-asc" : "date-desc";
                    else if (s === "title") sortMode = "title";
                    else if (s === "company") sortMode = "company";
                    else if (s === "domain") sortMode = "domain";
                    else if (s === "status") sortMode = "status";
                    document.getElementById("sortSelect").value = sortMode;
                    document.querySelectorAll("th[data-sort]").forEach(t => t.classList.toggle("sorted", t === th));
                    scheduleRender();
                });
            });

            document.getElementById("appsBody").addEventListener("click", e => {
                const openBtn = e.target.closest(".open-btn");
                if (openBtn) { ipcRenderer.send("open-url-in-home", openBtn.dataset.url); return; }
                const delBtn = e.target.closest(".del-btn");
                if (delBtn) {
                    const url = delBtn.dataset.url;
                    if (confirm(`Remove this application?\n\n${url}`)) {
                        ipcRenderer.send("delete-app", url);
                        allApps = allApps.filter(a => a.url !== url);
                        scheduleRender(); showToast("Removed");
                    }
                }
            });

            document.getElementById("refreshBtn").addEventListener("click", () => { loadData(); showToast("Refreshed"); });
            loadData();
        });
    </script>
</body>

</html>
